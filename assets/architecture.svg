<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 800" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0a6"/>
    </marker>
    <style>
      .box{fill:#e8f0fe;stroke:#4285f4;stroke-width:2;}
      .big{fill:#d2e3fc;stroke:#4285f4;stroke-width:2;}
      .end{fill:#aecbfa;stroke:#4285f4;stroke-width:2;}
      .lbl{fill:#202124;font-size:18px;text-anchor:middle;dominant-baseline:middle;}
      .sm{font-size:13px;}
      .edge{stroke:#9aa0a6;stroke-width:1.6;fill:none;}
      .title{fill:#5f6368;font-size:15px;}
    </style>
  </defs>

  <text x="20" y="28" class="title">Portfolio Processing Pipeline</text>

  <g class="edge">
    <path d="M150,360 H210" marker-end="url(#arrow)"/>
    <path d="M320,360 H360 V120 H420" marker-end="url(#arrow)"/>
    <path d="M320,360 H360 V220 H420" marker-end="url(#arrow)"/>
    <path d="M320,360 H360 V360 H420" marker-end="url(#arrow)"/>
    <path d="M320,360 H360 V500 H420" marker-end="url(#arrow)"/>
    <path d="M320,360 H360 V620 H420" marker-end="url(#arrow)"/>
    <path d="M320,360 H360 V730 H420" marker-end="url(#arrow)"/>
    <path d="M510,120 H560 V360 H600" marker-end="url(#arrow)"/>
    <path d="M510,220 H560 V360 H600" marker-end="url(#arrow)"/>
    <path d="M510,360 H600" marker-end="url(#arrow)"/>
    <path d="M510,500 H560 V360 H600" marker-end="url(#arrow)"/>
    <path d="M510,620 H560 V360 H600" marker-end="url(#arrow)"/>
    <path d="M510,730 H560 V360 H600" marker-end="url(#arrow)"/>
    <path d="M660,360 H700" marker-end="url(#arrow)"/>
    <path d="M810,360 H880" marker-end="url(#arrow)"/>
    <path d="M810,360 H840 V510 H880" marker-end="url(#arrow)"/>
    <path d="M810,360 H840 V620 H880" marker-end="url(#arrow)"/>
    <path d="M810,360 H840 V730 H880" marker-end="url(#arrow)"/>
    <path d="M970,360 H1010" marker-end="url(#arrow)"/>
    <path d="M970,510 H1000 V360 H1010" marker-end="url(#arrow)"/>
    <path d="M970,620 H1000 V360 H1010" marker-end="url(#arrow)"/>
    <path d="M970,730 H1000 V360 H1010" marker-end="url(#arrow)"/>
    <path d="M1070,360 H1110" marker-end="url(#arrow)"/>
    <path d="M1250,360 H1270" marker-end="url(#arrow)"/>
    <path d="M1410,360 H1430" marker-end="url(#arrow)"/>
    <path d="M1570,360 H1590" marker-end="url(#arrow)"/>
    <path d="M1750,360 H1770" marker-end="url(#arrow)"/>
  </g>

  <rect x="40" y="320" width="110" height="80" rx="8" class="box"/>
  <text x="95" y="352" class="lbl">Start:</text>
  <text x="95" y="374" class="lbl">load_portfolio</text>

  <rect x="210" y="320" width="110" height="80" rx="8" class="box"/>
  <text x="265" y="352" class="lbl">STAGE 1</text>
  <text x="265" y="374" class="lbl">(6 parallel)</text>

  <rect x="420" y="92"  width="90" height="56" rx="8" class="box"/><text x="465" y="120" class="lbl">greeks</text>
  <rect x="420" y="192" width="90" height="56" rx="8" class="box"/><text x="465" y="220" class="lbl">pca</text>
  <rect x="420" y="332" width="90" height="56" rx="8" class="box"/><text x="465" y="360" class="lbl">pnl</text>
  <rect x="420" y="472" width="90" height="56" rx="8" class="box"/><text x="465" y="500" class="lbl">risk</text>
  <rect x="420" y="592" width="90" height="56" rx="8" class="box"/><text x="465" y="620" class="lbl">stress</text>
  <rect x="420" y="702" width="90" height="56" rx="8" class="box"/><text x="465" y="730" class="lbl">vol_regime</text>

  <rect x="600" y="320" width="60" height="80" rx="8" class="box"/>
  <text x="630" y="352" class="lbl sm">fan-in</text>
  <text x="630" y="372" class="lbl sm">barrier</text>

  <rect x="700" y="320" width="110" height="80" rx="8" class="box"/>
  <text x="755" y="352" class="lbl">STAGE 2</text>
  <text x="755" y="374" class="lbl">(4 parallel)</text>

  <rect x="880" y="332" width="90" height="56" rx="8" class="box"/><text x="925" y="360" class="lbl">earnings</text>
  <rect x="880" y="482" width="90" height="56" rx="8" class="box"/><text x="925" y="510" class="lbl sm">filing_intel</text>
  <rect x="880" y="592" width="90" height="56" rx="8" class="box"/><text x="925" y="620" class="lbl">flows</text>
  <rect x="880" y="702" width="90" height="56" rx="8" class="box"/><text x="925" y="730" class="lbl">10k_rag</text>

  <rect x="1010" y="320" width="60" height="80" rx="8" class="box"/>
  <text x="1040" y="352" class="lbl sm">fan-in</text>
  <text x="1040" y="372" class="lbl sm">barrier</text>

  <rect x="1110" y="312" width="140" height="96" rx="8" class="big"/><text x="1180" y="360" class="lbl sm">accumulation_model</text>
  <rect x="1270" y="312" width="140" height="96" rx="8" class="big"/><text x="1340" y="360" class="lbl sm">conviction_synthesis</text>
  <rect x="1430" y="312" width="140" height="96" rx="8" class="big"/><text x="1500" y="360" class="lbl sm">generate_commentary</text>
  <rect x="1590" y="312" width="160" height="96" rx="8" class="big"/><text x="1670" y="360" class="lbl sm">evaluate_commentary</text>

  <rect x="1770" y="330" width="60" height="60" rx="30" class="end"/><text x="1800" y="360" class="lbl">End</text>
</svg>
